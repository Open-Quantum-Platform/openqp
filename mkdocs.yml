site_name: OpenQP Manual
site_description: User manual for the Open Quantum Platform
repo_url: https://github.com/Open-Quantum-Platform/openqp
repo_name: Open-Quantum-Platform/openqp

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Input Files: input-file.md
  - Capabilities: capabilities.md
  - Workflows:
      - HF and DFT: workflows/hf-dft.md
      - MRSF-TDDFT: workflows/mrsf-tddft.md
      - Optimization: workflows/optimization.md
      - Spin-Orbit Coupling: workflows/soc.md
      - NACME: workflows/nacme.md
      - PCM/ddX: workflows/pcm.md
      - MRSF-EKT: workflows/ekt.md
      - NMR, IR, and Raman: workflows/nmr-ir-raman.md
  - Keywords:
      - Overview: keywords/index.md
      - input: keywords/input.md
      - guess: keywords/guess.md
      - scf: keywords/scf.md
      - dftgrid: keywords/dftgrid.md
      - tdhf: keywords/tdhf.md
      - properties: keywords/properties.md
      - hess: keywords/hess.md
      - nac: keywords/nac.md
      - ekt: keywords/ekt.md
      - optimize: keywords/optimize.md
      - oqp: keywords/oqp.md
      - geometric: keywords/geometric.md
      - neb: keywords/neb.md
      - pcm: keywords/pcm.md
      - symmetry: keywords/symmetry.md
  - Examples: examples/index.md
  - Troubleshooting: troubleshooting.md
  - Developers:
      - Overview: developer/index.md
      - Release Packaging: release-packaging.md
