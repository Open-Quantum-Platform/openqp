name: Build and Push Multi-Platform Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_DOCKER_CREDENTIALS: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
      # Keep in sync with the FROM line in Dockerfile and docker/buildenv.Dockerfile.
      BUILDENV_IMAGE: openqp/openqp-buildenv:1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && env.HAS_DOCKER_CREDENTIALS == 'true'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin

      # The build environment (toolchain, ILP64 OpenBLAS, Python deps) is a
      # prebuilt image; pull it instead of reinstalling prerequisites on every
      # run. Until the image has been published once (or right after a tag
      # bump) the pull fails and we build it here; the next push-to-main run
      # with Docker Hub credentials publishes it.
      - name: Prepare build environment image
        run: |
          if ! docker pull "${BUILDENV_IMAGE}"; then
            echo "::warning::${BUILDENV_IMAGE} not in registry; building it from docker/buildenv.Dockerfile"
            docker build -t "${BUILDENV_IMAGE}" -f docker/buildenv.Dockerfile docker
          fi

      - name: Build OpenQP image
        run: docker build -t openqp/openqp:v1.0 .

      - name: Push images
        if: github.event_name == 'push' && env.HAS_DOCKER_CREDENTIALS == 'true'
        run: |
          docker push "${BUILDENV_IMAGE}"
          docker push openqp/openqp:v1.0
