name: Build and Push Multi-Platform Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_DOCKER_CREDENTIALS: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && env.HAS_DOCKER_CREDENTIALS == 'true'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # Layer cache backed by the GitHub Actions cache: the apt, pip, and
      # OpenBLAS-build layers are restored instead of re-executed and only
      # rerun when the Dockerfile changes. The OpenQP build layers after
      # `COPY . /opt/openqp` are invalidated by any source change and still
      # rebuild each run.
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && env.HAS_DOCKER_CREDENTIALS == 'true' }}
          tags: openqp/openqp:v1.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker Image
        if: github.event_name == 'push' && env.HAS_DOCKER_CREDENTIALS == 'true'
        run: |
          docker pull openqp/openqp:v1.0
          docker inspect openqp/openqp:v1.0
